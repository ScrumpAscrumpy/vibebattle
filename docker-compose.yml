services:
  postgres:
    image: postgres:16-alpine
    container_name: vibebattle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibebattle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vibebattle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibebattle"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vibebattle_postgres_data:
